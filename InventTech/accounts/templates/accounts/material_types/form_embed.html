<div class="material-form-embed">

  {% include "accounts/_messages_embed.html" %}

  <!-- Header -->
  <div class="mat-head">
    <div>
      <div class="mat-title">
        {% if mode == "edit" %}Edit Material Type{% else %}Create Material Type{% endif %}
      </div>
      <div class="mat-sub">Used in Material module dropdown</div>
    </div>

    <div class="mat-head-actions">
      <a class="mat-back" href="{% url 'accounts:materialtype_list' %}?embed=1" title="Back">
        ←
      </a>
      <button type="button" class="mat-close" data-embed-close title="Close">✕</button>
    </div>
  </div>

  <!-- Form -->
  <form method="post" enctype="multipart/form-data"
        action="{% url 'accounts:materialtype_add' %}" class="mat-form">
    {% csrf_token %}
    <input type="hidden" name="embed" value="1">

    <div class="mat-grid">
      <div class="mat-field mat-full">
        <label>Material Type Name</label>
        {{ form.name }}
      </div>

      <div class="mat-field mat-full">
        <label>Description</label>
        {{ form.description }}
      </div>
    </div>

    <!-- Footer -->
    <div class="mat-footer">
      <button type="submit" class="mat-save">Save</button>
    </div>
  </form>

</div>
