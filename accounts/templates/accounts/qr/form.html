{% load static %}
<style>
  :root{
    --rf-bg:#eef5ff;
    --rf-bg-2:#f7fbff;

    --rf-panel:#ffffff;
    --rf-panel-soft:#f8fbff;
    --rf-panel-blue:#eef5ff;
    --rf-panel-blue-2:#e8f1ff;

    --rf-line:#d7e6ff;
    --rf-line-soft:#e9f1ff;
    --rf-line-strong:#b8d2ff;

    --rf-text:#0f172a;
    --rf-muted:#64748b;
    --rf-muted-2:#8aa0c5;

    --rf-blue:#2563eb;
    --rf-blue-dark:#1d4ed8;
    --rf-blue-deep:#163b95;
    --rf-blue-soft:#eaf2ff;
    --rf-blue-soft-2:#f5f9ff;

    --rf-shadow:0 14px 30px rgba(37,99,235,.08);
    --rf-shadow-soft:0 8px 20px rgba(37,99,235,.05);
  }

  html,body{
    margin:0;
    padding:0;
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.08) 0, rgba(37,99,235,0) 28%),
      linear-gradient(180deg, var(--rf-bg) 0%, var(--rf-bg-2) 100%);
    color:var(--rf-text);
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .rf-page{
    padding:10px;
  }

  .rf-shell{
    max-width:860px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .rf-card{
    background:linear-gradient(180deg, #ffffff 0%, #f9fbff 100%);
    border:1px solid var(--rf-line);
    border-radius:16px;
    padding:14px;
    box-shadow:var(--rf-shadow-soft);
  }

  .rf-topcard{
    background:
      linear-gradient(135deg, rgba(37,99,235,.10) 0%, rgba(37,99,235,.04) 18%, #ffffff 18%, #f7fbff 100%);
    border-color:var(--rf-line-strong);
    box-shadow:var(--rf-shadow);
  }

  .rf-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:12px;
  }

  .rf-title-wrap{
    min-width:0;
  }

  .rf-title{
    margin:0;
    font-size:20px;
    line-height:1.05;
    font-weight:800;
    color:#0f172a;
    letter-spacing:-.02em;
    font-family:ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
  }

  .rf-sub{
    margin-top:6px;
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
    font-size:11px;
    font-weight:700;
    color:var(--rf-muted);
  }

  .rf-sub svg{
    width:14px;
    height:14px;
    stroke:currentColor;
    stroke-width:2;
    fill:none;
    flex:none;
  }

  .rf-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    min-height:30px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid var(--rf-line-strong);
    background:var(--rf-blue-soft);
    color:var(--rf-blue-dark);
    font-size:10px;
    font-weight:900;
    letter-spacing:.04em;
    white-space:nowrap;
  }

  .rf-chip svg{
    width:12px;
    height:12px;
    stroke:currentColor;
    stroke-width:2;
    fill:none;
    flex:none;
  }

  .rf-form p{
    margin:0 0 12px;
  }

  .rf-form label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:10px;
    font-weight:900;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#8ea4ca;
    margin-bottom:4px;
  }

  .rf-form input,
  .rf-form select,
  .rf-form textarea{
    width:100%;
    border:1px solid var(--rf-line);
    border-radius:12px;
    background:#fff;
    padding:10px 11px;
    font-size:12px;
    color:#0f172a;
    outline:none;
    box-sizing:border-box;
    transition:.18s ease;
  }

  .rf-form textarea{
    min-height:110px;
    resize:vertical;
  }

  .rf-form input::placeholder,
  .rf-form textarea::placeholder{
    color:#8ea4ca;
    font-weight:700;
  }

  .rf-form input:focus,
  .rf-form select:focus,
  .rf-form textarea:focus{
    border-color:var(--rf-blue);
    box-shadow:0 0 0 4px rgba(37,99,235,.10);
  }

  .rf-actions{
    display:flex;
    justify-content:flex-end;
    margin-top:6px;
  }

  .rf-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    min-height:40px;
    padding:0 16px;
    border-radius:12px;
    border:1px solid var(--rf-blue);
    background:linear-gradient(180deg, var(--rf-blue) 0%, var(--rf-blue-dark) 100%);
    color:#fff;
    text-decoration:none;
    font-size:11px;
    font-weight:900;
    letter-spacing:.04em;
    transition:.18s ease;
    white-space:nowrap;
    cursor:pointer;
    box-shadow:0 10px 18px rgba(37,99,235,.16);
  }

  .rf-btn svg{
    width:14px;
    height:14px;
    stroke:currentColor;
    stroke-width:2;
    fill:none;
    flex:none;
  }

  .rf-btn:hover{
    background:linear-gradient(180deg, var(--rf-blue-dark) 0%, var(--rf-blue-deep) 100%);
    border-color:var(--rf-blue-dark);
  }

  ul.errorlist{
    list-style:none;
    margin:4px 0 0;
    padding:0;
    color:#dc2626;
    font-size:11px;
    font-weight:700;
  }

  .helptext{
    display:block;
    margin-top:4px;
    color:var(--rf-muted);
    font-size:10.5px;
    line-height:1.35;
    font-weight:600;
  }

  @media (max-width:900px){
    .rf-page{padding:8px}
  }

  @media (max-width:560px){
    .rf-head{flex-direction:column;align-items:flex-start;}
    .rf-title{font-size:18px}
  }
</style>

<div class="rf-page">
  <div class="rf-shell">
    <div class="rf-card rf-topcard">
      <div class="rf-head">
        <div class="rf-title-wrap">
          <h2 class="rf-title">QR Code</h2>
          <div class="rf-sub">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 3h7v7H3z"></path>
              <path d="M14 3h7v7h-7z"></path>
              <path d="M3 14h7v7H3z"></path>
              <path d="M14 14h3"></path>
              <path d="M17 14v3"></path>
              <path d="M21 14v7h-7"></path>
            </svg>
            Generate QR for lot traceability and scanning
          </div>
        </div>

        <span class="rf-chip">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2l7 4v6c0 5-3.5 8-7 10-3.5-2-7-5-7-10V6l7-4z"></path>
          </svg>
          Generate
        </span>
      </div>

      <form method="post" class="rf-form">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="rf-actions">
          <button type="submit" class="rf-btn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
            Save QR
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
