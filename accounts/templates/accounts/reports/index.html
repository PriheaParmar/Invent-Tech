{% extends "accounts/base_app.html" %}
{% block title %}Reports{% endblock %}
{% block page_title %}Reports{% endblock %}
{% block page_subtitle %}{% endblock %}
{% block content %}
<style>
  .rp-wrap{--font-ui:"Inter","Segoe UI","Aptos",Arial,sans-serif;--font-title:"Playfair Display","Cormorant Garamond",Georgia,"Times New Roman",serif;--font-data:"IBM Plex Sans","Segoe UI",Arial,sans-serif;padding:16px;min-height:100vh;background:radial-gradient(circle at 8% 4%,rgba(238,61,133,.16),transparent 30%),radial-gradient(circle at 96% 8%,rgba(28,109,216,.18),transparent 34%),radial-gradient(circle at 86% 96%,rgba(250,189,100,.25),transparent 34%),linear-gradient(135deg,#f8fbff,#fff7fb 46%,#fffaf1)}
  .rp-panel{background:rgba(255,255,255,.90);border:1px solid rgba(255,255,255,.78);border-radius:24px;box-shadow:0 24px 70px rgba(17,35,72,.13);overflow:hidden;backdrop-filter:blur(16px) ; height: 100vh;}
  .rp-panel:before{content:"";display:block;height:5px;background:linear-gradient(90deg,#1c6dd8,#ee3d85,#fabd64)}
  .rp-head{padding:18px 20px;border-bottom:1px solid rgba(28,109,216,.10);display:flex;align-items:end;justify-content:space-between;gap:12px;flex-wrap:wrap;background:linear-gradient(135deg,rgba(255,255,255,.94),rgba(255,247,251,.82))}
  .rp-title{font-size:28px;line-height:1.05;font-weight:800;font-family:var(--font-title);color:#102033;letter-spacing:-.05em}.rp-sub{margin-top:6px;color:#68778c;font-size:12px;font-family:var(--font-data);font-weight:700;letter-spacing:.01em}
  .rp-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.rp-select{min-width:360px;height:42px;border:1px solid rgba(28,109,216,.18);border-radius:14px;padding:0 13px;font:800 12px var(--font-data);outline:none;background:rgba(255,255,255,.94);color:#102033;box-shadow:0 10px 22px rgba(16,32,51,.05)}
  .rp-select:focus{border-color:rgba(238,61,133,.50);box-shadow:0 0 0 4px rgba(238,61,133,.10)}.rp-btn{height:42px;padding:0 16px;border-radius:14px;border:1px solid transparent;background:linear-gradient(135deg,#1c6dd8,#4f8df5);color:#fff;font:900 12px var(--font-ui);cursor:pointer;box-shadow:0 12px 24px rgba(28,109,216,.16)}
  .rp-btn-light{background:rgba(255,255,255,.92);color:#102033;border-color:rgba(28,109,216,.18);box-shadow:0 10px 22px rgba(16,32,51,.06)}.rp-body{padding:0;background:rgba(255,255,255,.70)}.rp-frame{width:100%;height:76vh;border:none;background:transparent;display:block}.rp-empty{padding:54px 16px;text-align:center;color:#68778c;font:900 13px var(--font-ui);background:linear-gradient(135deg,rgba(28,109,216,.05),rgba(238,61,133,.04),rgba(250,189,100,.08))}
    @media(max-width:900px){.rp-select{min-width:100%}.rp-controls{width:100%}.rp-btn{flex:1}}
</style>

<div class="rp-wrap"><div class="rp-panel"><div class="rp-head"><div><div class="rp-title">Reports</div><div class="rp-sub">Select a report and use its filters inside the report page.</div></div><div class="rp-controls"><select id="reportSelector" class="rp-select"><option value="">Select Report</option>{% for item in report_cards %}<option value="{{ item.url }}" data-excel="{{ item.excel_url }}">{{ item.title }}</option>{% endfor %}</select><button id="openReportBtn" class="rp-btn">Open</button><button id="excelReportBtn" class="rp-btn rp-btn-light">Excel</button></div></div><div class="rp-body"><div id="emptyState" class="rp-empty">Select a report to view</div><iframe id="reportFrame" class="rp-frame" style="display:none;"></iframe></div></div></div><script>(function(){const select=document.getElementById('reportSelector'),openBtn=document.getElementById('openReportBtn'),excelBtn=document.getElementById('excelReportBtn'),frame=document.getElementById('reportFrame'),empty=document.getElementById('emptyState');function openReport(){const url=select.value;if(!url)return;frame.src=url+(url.includes('?')?'&':'?')+'embed=1';frame.style.display='block';empty.style.display='none'}function openExcel(){const selected=select.options[select.selectedIndex];const excelUrl=selected.getAttribute('data-excel');if(excelUrl){window.open(excelUrl,'_blank')}}openBtn.addEventListener('click',openReport);excelBtn.addEventListener('click',openExcel);select.addEventListener('change',openReport)})();</script>
{% endblock %}
