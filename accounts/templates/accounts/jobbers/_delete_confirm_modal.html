<div class="jb-confirm-modal" id="jbDeleteConfirm" hidden>
  <div class="jb-confirm-backdrop" data-jb-close></div>

  <div class="jb-confirm-card" role="dialog" aria-modal="true" aria-labelledby="jbConfirmTitle">
    <div class="jb-confirm-icon">!</div>

    <div class="jb-confirm-title" id="jbConfirmTitle">Delete item?</div>
    <div class="jb-confirm-text" id="jbConfirmText">
      This action cannot be undone.
    </div>

    <div class="jb-confirm-actions">
      <button type="button" class="jb-secondary" data-jb-close>Cancel</button>
      <button type="button" class="jb-danger-btn" id="jbConfirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>
