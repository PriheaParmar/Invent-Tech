<div class="jb-confirm-modal" id="jbDeleteConfirm" hidden>
  <div
    class="jb-confirm-backdrop"
    data-jb-close
    onclick="event.preventDefault();event.stopPropagation();var m=this.closest('.jb-confirm-modal');if(!m)return false;m.hidden=true;m.classList.remove('is-open','is-closing');document.body.classList.remove('jb-modal-open');m._pendingForm=null;var p=m._previousActiveElement;m._previousActiveElement=null;if(p&&typeof p.focus==='function'){p.focus();}return false;"
  ></div>

  <div
    class="jb-confirm-card"
    role="dialog"
    aria-modal="true"
    aria-labelledby="jbConfirmTitle"
    aria-describedby="jbConfirmText jbConfirmNote"
  >
    <button
      type="button"
      class="jb-confirm-close"
      data-jb-close
      aria-label="Close"
      onclick="event.preventDefault();event.stopPropagation();var m=this.closest('.jb-confirm-modal');if(!m)return false;m.hidden=true;m.classList.remove('is-open','is-closing');document.body.classList.remove('jb-modal-open');m._pendingForm=null;var p=m._previousActiveElement;m._previousActiveElement=null;if(p&&typeof p.focus==='function'){p.focus();}return false;"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M18 6L6 18"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></path>
        <path
          d="M6 6l12 12"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></path>
      </svg>
    </button>

    <div class="jb-confirm-header">
      <div class="jb-confirm-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path
            d="M3 6h18"
            fill="none"
            stroke="currentColor"
            stroke-width="1.9"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
          <path
            d="M8 6V4.75C8 3.78 8.78 3 9.75 3h4.5C15.22 3 16 3.78 16 4.75V6"
            fill="none"
            stroke="currentColor"
            stroke-width="1.9"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
          <path
            d="M6.5 6l.85 12.2A2 2 0 0 0 9.34 20h5.32a2 2 0 0 0 1.99-1.8L17.5 6"
            fill="none"
            stroke="currentColor"
            stroke-width="1.9"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
          <path
            d="M10 10.25v5.5"
            fill="none"
            stroke="currentColor"
            stroke-width="1.9"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
          <path
            d="M14 10.25v5.5"
            fill="none"
            stroke="currentColor"
            stroke-width="1.9"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
        </svg>
      </div>

      <div class="jb-confirm-header-copy">
        <div class="jb-confirm-title" id="jbConfirmTitle">Delete item?</div>
        <div class="jb-confirm-text" id="jbConfirmText">
          This record will be permanently removed from your utilities list.
        </div>
      </div>
    </div>

    <div class="jb-confirm-body">
      <div class="jb-confirm-item-label">Selected item</div>
      <div class="jb-confirm-label" id="jbConfirmLabel">this item</div>

      <div class="jb-confirm-note" id="jbConfirmNote">
        This action cannot be undone.
      </div>
    </div>

    <div class="jb-confirm-actions">
      <button
        type="button"
        class="jb-secondary"
        data-jb-close
        onclick="event.preventDefault();event.stopPropagation();var m=this.closest('.jb-confirm-modal');if(!m)return false;m.hidden=true;m.classList.remove('is-open','is-closing');document.body.classList.remove('jb-modal-open');m._pendingForm=null;var p=m._previousActiveElement;m._previousActiveElement=null;if(p&&typeof p.focus==='function'){p.focus();}return false;"
      >
        Cancel
      </button>

      <button
        type="button"
        class="jb-danger-btn"
        id="jbConfirmDeleteBtn"
        onclick="event.preventDefault();event.stopPropagation();var m=this.closest('.jb-confirm-modal');if(!m)return false;var f=m._pendingForm||null;var p=m._previousActiveElement;m.hidden=true;m.classList.remove('is-open','is-closing');document.body.classList.remove('jb-modal-open');m._pendingForm=null;m._previousActiveElement=null;if(p&&typeof p.focus==='function'){p.focus();}if(f){f.dataset.confirmed='1';if(typeof f.requestSubmit==='function'){f.requestSubmit();}else{f.submit();}}return false;"
      >
        Delete
      </button>
    </div>
  </div>
</div>
