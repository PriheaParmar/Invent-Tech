{% load static %}
<link rel="stylesheet" href="{% static 'css/jobbers/types.css' %}?v=1">
<div class="jobbers-embed jb-types-embed">
  <section class="jb-panel">
    <div class="jb-head">
      <div>
        <div class="jb-title">Jobber Types</div>
        <div class="jb-sub">Manage jobber categories</div>
      </div>

      <div class="jb-head-actions">
        <a class="jb-iconbtn jb-back" href="{% url 'accounts:jobber_list' %}?embed=1" aria-label="Back">
          <svg class="jb-back-ico" xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 0 24 24">
            <path
              d="M22.0003 13.0001L22.0004 11.0002L5.82845 11.0002L9.77817 7.05044L8.36396 5.63623L2 12.0002L8.36396 18.3642L9.77817 16.9499L5.8284 13.0002L22.0003 13.0001Z">
            </path>
          </svg>
        </a>

        <button type="button" class="jb-iconbtn jb-close" data-embed-close aria-label="Close">
          <svg class="jb-ico" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6L6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>

    <form method="post" action="{% url 'accounts:jobbertype_list' %}?embed=1" class="jb-inline-form">
      {% csrf_token %}
      <input type="hidden" name="embed" value="1">

      <div class="jb-inline-field">
        <label for="{{ form.name.id_for_label }}">New Type</label>
        {{ form.name }}
        {% if form.name.errors %}
        <div class="jb-field-errors">
          {% for error in form.name.errors %}<p>{{ error }}</p>{% endfor %}
        </div>
        {% endif %}
      </div>

      <button class="jb-add" type="submit">Add</button>
    </form>

    <div class="jb-tablewrap">
      <table class="jb-table">
        <thead>
          <tr>
            <th>Name</th>
            <th style="width: 140px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for t in types %}
          <tr>
            <td>{{ t.name }}</td>
            <td class="jb-actions">
              <a class="jb-link" href="{% url 'accounts:jobbertype_edit' t.id %}?embed=1">Edit</a>
              <span class="jb-dot">•</span>
              <form method="post" action="{% url 'accounts:jobbertype_delete' t.id %}?embed=1"
                class="jb-inline-delete js-jb-delete-form"
                data-delete-label="jobber type &quot;{{ t.name|escape }}&quot;">
                {% csrf_token %}
                <button class="jb-link jb-link-danger jb-link-button" type="submit">Delete</button>
              </form>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="2" class="jb-empty">No types yet.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    </section>
</div>
