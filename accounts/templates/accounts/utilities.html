{% extends "accounts/base_app.html" %}
{% load static %}

{% block title %}Utilities - InventTech{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/utilities.css' %}">
<style>
  :root{
    --util-orange: rgba(250, 189, 100, 1);
    --util-orange-soft: rgba(250, 189, 100, 0.12);
    --util-orange-soft-2: rgba(250, 189, 100, 0.18);
    --util-orange-line: rgba(250, 189, 100, 0.42);

    --util-bg: #fcfbf8;
    --util-panel: #ffffff;
    --util-panel-soft: #f8f6f2;

    --util-line: #e7e1d7;
    --util-line-soft: #f2ede5;
    --util-line-dark: #ddd5ca;

    --util-text: #1b2430;
    --util-text-soft: #707887;

    --util-font-sans: Inter, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --util-font-serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, "Times New Roman", serif;
  }

  #section-utilities .canvas{
    grid-template-columns:1fr !important;
  }

  .util-grid-section,
  .c8{
    grid-column:1 / -1;
  }

  #section-utilities .card.soft.big.c8{
  background:#fcfaf6;
  box-shadow:
    0 10px 26px rgba(15,23,42,.045),
    inset 0 1px 0 rgba(255,255,255,.65);
}

  .util-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
    padding-bottom: 2px;
  }

  #section-utilities .card-title{
    font-family: var(--util-font-serif);
    font-size: 28px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #121a24;
  }

  #section-utilities .card-sub{
    margin-top: 6px;
    font-family: var(--util-font-sans);
    font-size: 12px;
    line-height: 1.45;
    font-weight: 600;
    color: var(--util-text-soft);
  }

  .util-search{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:999px;
    background:linear-gradient(180deg, #fffdfa 0%, #f8f6f2 100%);
    border:1px solid rgba(250,189,100,.24);
    box-shadow:0 10px 24px rgba(15,23,42,.05);
  }

  .util-search .ico{
    width:18px;
    height:18px;
    color:#8a651f;
  }

  .util-search input{
    border:none;
    outline:none;
    background:transparent;
    width:320px;
    font-size:13px;
    font-family: var(--util-font-sans);
    font-weight: 600;
    color:var(--util-text);
  }

  .util-search input::placeholder{
    color:#9aa1ab;
  }

  .util-inline-panel{
    margin:0 0 14px;
    overflow:visible;
    position:relative;
    z-index:5;
    opacity:0;
    transform:translateY(-10px);
    max-height:0;
    pointer-events:none;
    transition:
      opacity .24s ease,
      transform .24s ease,
      max-height .30s ease;
  }

  #mastersEmbedPanel{
    display:block !important;
    width:100%;
  }

  #mastersEmbedPanel.is-open{
    opacity:1;
    transform:translateY(0);
    max-height:10000px;
    pointer-events:auto;
    overflow:visible;
  }

  #mastersEmbedMount{
    min-height:110px;
    width:100%;
    pointer-events:auto;
    overflow:visible;
    transition:opacity .18s ease, transform .18s ease;
  }

  #mastersEmbedMount.is-loading{
    opacity:.58;
    pointer-events:none;
    transform:translateY(6px);
  }

  .util-sections,
  .util-layout,
  .util-row{
    width:100%;
  }

  .util-layout{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .util-row{
    display:grid;
    grid-template-columns:repeat(6, minmax(0, 1fr));
    gap:14px;
    align-items:stretch;
  }

  .util-row > .util-group{
    justify-self:stretch;
    align-self:stretch;
    width:auto;
  }

  .util-group{
  min-width:0;
  padding:16px;
  border-radius:16px;
  background:#fffdf9;
  border:1px solid #ebe4d9;
  box-shadow:
    0 8px 22px rgba(15,23,42,.04),
    inset 0 1px 0 rgba(255,255,255,.72);
  box-sizing:border-box;
  overflow:visible;
}

  .util-group-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin:0 0 12px;
  }

  .util-group-title{
    font-size:11px;
    font-weight:900;
    letter-spacing:.16em;
    text-transform:uppercase;
    white-space:nowrap;
    color:#8a651f;
    font-family: var(--util-font-sans);
  }

  .util-group-line{
    flex:1;
    height:1px;
    background:linear-gradient(90deg, rgba(250,189,100,.38), rgba(250,189,100,.06));
  }

  .util-group-count{
    min-width:28px;
    height:28px;
    padding:0 9px;
    display:grid;
    place-items:center;
    border-radius:999px;
    background:rgba(250,189,100,.12);
    border:1px solid rgba(250,189,100,.35);
    font-size:11px;
    font-weight:800;
    color:#70531c;
    font-family: var(--util-font-sans);
  }

.util-group-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, 210px);
  gap:12px;
  justify-content:start;
}
.util-group--dyeing .util-group-grid,
.util-group--design .util-group-grid,
.util-group--inventory .util-group-grid,
.util-group--dispatch .util-group-grid,
.util-group--accounts .util-group-grid,
.util-group--configuration .util-group-grid,
.util-group--others .util-group-grid{
  justify-content:flex-start;
}
.util-tile{
  position:relative;
  display:grid;
  grid-template-columns:56px minmax(0, 1fr);
  align-items:center;
  gap:14px;
  min-height:100px;
  padding:14px 16px;
  border-radius:14px;
  text-decoration:none;
  color:var(--util-text);
  background:#fff;
  border:1px solid #eee5d8;
  box-shadow:0 4px 14px rgba(15,23,42,.035);
  overflow:hidden;
  width:210px;
  max-width:100%;
  transition:
    transform .22s ease,
    box-shadow .22s ease,
    border-color .22s ease,
    background .22s ease,
    color .22s ease;
}

  .util-tile::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    width:4px;
    border-radius:20px 0 0 20px;
    background:var(--util-orange);
    opacity:.92;
    transition:width .22s ease, opacity .22s ease;
  }
.util-tile:hover{
  transform:translateY(-3px);
  border-color:#e7d3ad;
  background:#fffaf1;
  box-shadow:
    0 12px 24px rgba(250,189,100,.11),
    0 0 0 1px rgba(250,189,100,.06);
  color:var(--util-text);
}

  .util-tile:hover::before{
    width:5px;
    opacity:1;
  }

  .util-tile:active{
    transform:translateY(-1px) scale(.995);
  }

  .util-tile.is-disabled{
    opacity:.62;
    pointer-events:none;
  }

  .util-ico,
  .util-meta{
    position:relative;
    z-index:2;
  }

  .util-ico{
    width:56px;
    height:56px;
    border-radius:18px;
    display:grid;
    place-items:center;
    background:linear-gradient(180deg, #fffdfa 0%, #f8f6f2 100%);
    border:1px solid rgba(250,189,100,.24);
    box-shadow:0 8px 18px rgba(15,23,42,.06);
    transition:
      transform .24s ease,
      border-color .24s ease,
      box-shadow .24s ease,
      background .24s ease;
  }

  .util-ico .ico{
    width:24px;
    height:24px;
    color:var(--util-orange);
    stroke:currentColor;
    fill:none;
    stroke-width:1.9;
    stroke-linecap:round;
    stroke-linejoin:round;
    transition:
      transform .24s ease,
      color .24s ease,
      filter .24s ease,
      opacity .24s ease;
  }

  .util-ico .ico path,
  .util-ico .ico circle,
  .util-ico .ico rect,
  .util-ico .ico line,
  .util-ico .ico polyline,
  .util-ico .ico polygon{
    transition:inherit;
  }

  .util-meta{
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:2px;
    transition:transform .22s ease;
  }

  .util-title{
    margin:0;
    font-family: var(--util-font-serif);
    font-size:14px;
    font-weight:700;
    line-height:1.2;
    letter-spacing:-.02em;
    color:#111827;
    white-space:normal;
    word-break:break-word;
    transition:
      color .22s ease,
      letter-spacing .22s ease,
      transform .22s ease;
  }

  .util-tile:hover .util-ico{
    transform:translateY(-2px) scale(1.06) rotate(-2deg);
    background:#fff;
    border-color:rgba(250,189,100,.48);
    box-shadow:0 14px 28px rgba(250,189,100,.16);
  }

  .util-tile:hover .util-ico .ico{
    color:#8a651f;
    transform:scale(1.10);
    filter:drop-shadow(0 4px 12px rgba(250,189,100,.28));
  }

  .util-tile:hover .util-meta{
    transform:translateX(2px);
  }

  .util-tile:hover .util-title{
    color:#111827;
    letter-spacing:-.025em;
    transform:translateX(1px);
  }

  .tiny-note{
    padding:20px 4px 4px;
    color:#707887;
    font-size:14px;
    font-weight:600;
    font-family: var(--util-font-sans);
  }

  @media (max-width: 1400px){
    .util-row{
      grid-template-columns:repeat(6, minmax(0, 1fr));
    }
  }

  @media (max-width: 1100px){
    .util-row{
      grid-template-columns:repeat(4, minmax(0, 1fr));
    }
  }

  @media (max-width: 760px){
    .util-row{
      grid-template-columns:repeat(2, minmax(0, 1fr));
    }

    .util-group{
      grid-column:span 2 !important;
    }

    .util-search input{
      width:100%;
      min-width:0;
    }
  }

  @media (max-width: 520px){
    .util-row{
      grid-template-columns:1fr;
    }

    .util-group{
      grid-column:span 1 !important;
    }
  }
</style>
{% endblock %}

{% block content %}
<section id="section-utilities" class="page-section is-active">
  <div class="canvas">
    <section class="grid util-grid-section">
      <div class="card soft big c8">

        <div class="card-head util-head">
          <div>
            <div class="card-title">Utilities</div>
            <div class="card-sub">
              Masters, setup, uploads & configuration — everything in one place.
            </div>
          </div>

          <div class="util-search">
            <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 21l-4.3-4.3"></path>
              <path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"></path>
            </svg>
            <input
              id="utilSearch"
              type="text"
              placeholder="Search utilities… (jobber, shade, greige, bom, catalogue)"
            />
          </div>
        </div>

        <div id="mastersEmbedPanel" class="util-inline-panel">
          <div id="mastersEmbedMount"></div>
        </div>

        <div id="utilSections" class="util-sections"></div>

      </div>
    </section>
  </div>
</section>
{% endblock %}

  let MASTERS_REQUEST_SEQ = 0;

  function escapeHtml(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function normalize(str) {
    return String(str || "").trim().toLowerCase();
  }

  function withEmbed(url) {
    const u = new URL(url, window.location.origin);
    u.searchParams.set("embed", "1");
    return u.toString();
  }

  function sortByConfiguredOrder(items, tag) {
    const order = INTRA_ORDER[tag] || [];
    return [...items].sort((a, b) => {
      const ai = order.indexOf(a.name);
      const bi = order.indexOf(b.name);

      if (ai === -1 && bi === -1) return a.name.localeCompare(b.name);
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
  }

  const MASTER_ROUTE_PREFIXES = MASTER_TILE_NAMES
    .map((name) => ROUTES[name])
    .filter(Boolean)
    .map((url) => {
      try {
        return new URL(url, window.location.origin).pathname.replace(/\/+$/, "");
      } catch (err) {
        return "";
      }
    })
    .filter(Boolean);

  function isMastersTile(name) {
    return MASTER_TILE_NAMES.includes(name);
  }

  function isMastersUrl(url) {
    try {
      const path = new URL(url, window.location.origin).pathname.replace(/\/+$/, "");
      return MASTER_ROUTE_PREFIXES.some((prefix) => path === prefix || path.startsWith(prefix + "/"));
    } catch (err) {

  }

  function getUtilityGroupStyle(tag, span) {
    const gridColumn = FULL_WIDTH_TAGS.has(tag)
      ? "1 / -1"
      : `span ${span}`;

const colsMap = {
  Masters: 6,
  Dyeing: 2,
  Design: 3,
  Others: 6,
};

    const cols = colsMap[tag] || 3;
    return `grid-column:${gridColumn}; --cols:${cols};`;
  }

  function renderUtilities(query) {
    const container = document.getElementById("utilSections");
    if (!container) return;

    const q = normalize(query);

    const filtered = UTILITIES.filter((item) => {
      if (!q) return true;
      return normalize(item.name).includes(q) || normalize(item.tag).includes(q);
    });

    const grouped = {};
    filtered.forEach((item) => {
      if (!grouped[item.tag]) grouped[item.tag] = [];
      grouped[item.tag].push(item);
    });

    let html = `<div class="util-layout">`;

    Object.values(ROW_LAYOUT).forEach((row) => {
      const rowHtml = row.map(({ tag, span }) => {
        const items = sortByConfiguredOrder(grouped[tag] || [], tag);
        if (!items.length) return "";

        const tiles = items.map((item) => {
          const route = ROUTES[item.name];
          const disabledClass = route ? "" : " is-disabled";

          return `
            <a
              href="${route ? escapeHtml(route) : 'javascript:void(0)'}"
              data-name="${escapeHtml(item.name)}"
              data-tag="${escapeHtml(item.tag)}"
              class="util-tile${disabledClass}"
            >
              <div class="util-ico">${iconMarkup(item.icon)}</div>
              <div class="util-meta">
                <div class="util-title">${escapeHtml(item.name)}</div>
              </div>
            </a>
          `;
        }).join("");

        const groupClass = `util-group util-group--${String(tag).toLowerCase().replace(/\s+/g, "-")}`;

        return `
          <section class="${groupClass}" style="${getUtilityGroupStyle(tag, span)}">
            <div class="util-group-head">
              <div class="util-group-title">${escapeHtml(TAG_LABEL[tag] || tag)}</div>
              <div class="util-group-line"></div>
              <div class="util-group-count">${items.length}</div>
            </div>

            <div class="util-group-grid">
              ${tiles}
            </div>
          </section>
        `;
      }).filter(Boolean).join("");

      if (rowHtml) {
        html += `<div class="util-row">${rowHtml}</div>`;
      }
    });

    html += `</div>`;
    container.innerHTML = html;
  }

  function submitEmbedForm(form) {
    if (!form) return;

    if (typeof form.requestSubmit === "function") {
      form.requestSubmit();
      return;
    }

    form.dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
  }

  function bindEmbedAutosubmit(mount) {
    if (!mount) return;

    mount.querySelectorAll("[data-embed-autosubmit-form]").forEach(function (form) {
      form.querySelectorAll("[data-embed-autosubmit]").forEach(function (field) {
        if (field.dataset.bound === "1") return;

        field.dataset.bound = "1";
        field.removeAttribute("onchange");
        field.onchange = null;
        field.addEventListener("change", function () {
          submitEmbedForm(form);
        });
      });
    });
  }

  function bindMaterialSubtypeForm(mount) {
    if (!mount) return;

    const form = mount.querySelector('[data-material-subtype-form="1"]');
    if (!form || form.dataset.kindSyncBound === "1") return;

    form.dataset.kindSyncBound = "1";

    const kindInputs = form.querySelectorAll('input[name="material_kind"]');
    const typeSelect = form.querySelector('[name="material_type"]');

    if (!kindInputs.length || !typeSelect) return;

    function selectedKind() {
      const checked = Array.from(kindInputs).find((input) => input.checked);
      return checked ? checked.value : "";
    }

    function syncTypes() {
      const kind = selectedKind();
      let hasVisibleChoice = false;

      Array.from(typeSelect.options).forEach(function (option) {
        if (!option.value) {
          option.hidden = false;
          option.disabled = false;
          return;
        }

        const optionKind = option.getAttribute("data-kind") || "";
        const shouldShow = !kind || optionKind === kind;

        option.hidden = !shouldShow;
        option.disabled = !shouldShow;

        if (shouldShow) hasVisibleChoice = true;
      });

      const currentOption = typeSelect.options[typeSelect.selectedIndex];
      if (currentOption && currentOption.value && currentOption.disabled) {
        typeSelect.value = "";
      }

      typeSelect.disabled = !!kind && !hasVisibleChoice;
    }

    kindInputs.forEach((input) => input.addEventListener("change", syncTypes));
    syncTypes();
  }

  function bindBomForm(mount) {
    if (!mount) return;

    const root = mount.querySelector("[data-bom-root]");
    if (!root || root.dataset.bomBound === "1") return;

    root.dataset.bomBound = "1";

    function updateDeleteField(row) {
      const deleteInput = row.querySelector('input[type="checkbox"][name$="-DELETE"]');
      if (deleteInput) {
        deleteInput.checked = true;
        row.style.display = "none";
      } else {
        row.remove();
      }
    }

    function bindRemoveButtons(scope) {
      scope.querySelectorAll(".bom-remove-btn").forEach(function (btn) {
        if (btn.dataset.bound === "1") return;
        btn.dataset.bound = "1";

        btn.addEventListener("click", function () {
          const row = btn.closest("tr");
          if (!row) return;
          updateDeleteField(row);
        });
      });
    }

    function recalcRow(row) {
      const inputs = row.querySelectorAll("input");
      let cpu = null;
      let avg = null;
      let cost = null;

      inputs.forEach(function (input) {
        const name = input.name || "";
        if (name.includes("cost_per_unit")) cpu = input;
        if (name.includes("avg")) avg = input;
        if (name.includes("cost") && !name.includes("cost_per_unit")) cost = input;
      });

      if (!cpu || !avg || !cost) return;

      const cpuVal = parseFloat(cpu.value || "0");
      const avgVal = parseFloat(avg.value || "0");
      const total = (isNaN(cpuVal) ? 0 : cpuVal) * (isNaN(avgVal) ? 0 : avgVal);
      cost.value = total.toFixed(2);
    }

    function bindCalc(scope) {
      scope.querySelectorAll("tr.bom-form-row").forEach(function (row) {
        if (row.dataset.calcBound === "1") return;
        row.dataset.calcBound = "1";

        row.querySelectorAll("input").forEach(function (input) {
          const name = input.name || "";
          if (name.includes("cost_per_unit") || name.includes("avg")) {
            input.addEventListener("input", function () {
              recalcRow(row);
            });
          }
        });

        recalcRow(row);
      });
    }

    function addForm(prefix, templateId, tbodyId) {
      const totalInput = root.querySelector("#id_" + prefix + "-TOTAL_FORMS");
      const tbody = root.querySelector("#" + tbodyId);
      const template = root.querySelector("#" + templateId);

      if (!totalInput || !tbody || !template) return;

      const index = parseInt(totalInput.value, 10);
      const html = template.innerHTML.replace(/__prefix__/g, index);

      const wrapper = document.createElement("tbody");
      wrapper.innerHTML = html.trim();

      const row = wrapper.firstElementChild;
      if (!row) return;

      tbody.appendChild(row);
      totalInput.value = index + 1;

      bindRemoveButtons(row);
      bindCalc(row);
    }

    const addMaterialBtn = root.querySelector("#add-material-row");
    const addAccessoryBtn = root.querySelector("#add-accessory-row");

    if (addMaterialBtn) {
      addMaterialBtn.addEventListener("click", function () {
        addForm("materials", "material-empty-form", "material-rows");
      });
    }

    if (addAccessoryBtn) {
      addAccessoryBtn.addEventListener("click", function () {
        addForm("accessories", "accessory-empty-form", "accessory-rows");
      });
    }

    bindRemoveButtons(root);
    bindCalc(root);
  }

  function bindDyeingMasterForm(mount) {
    if (!mount) return;

    mount.querySelectorAll('[data-dyeing-link-root="1"]').forEach(function (root) {
      if (root.dataset.dyeingLinkBound === "1") return;
      root.dataset.dyeingLinkBound = "1";

      const body = root.querySelector('[data-dyeing-link-body="1"]');
      const template = root.querySelector('[data-dyeing-link-empty-form="1"]');
      const totalForms = root.querySelector('input[name$="-TOTAL_FORMS"]');
      const addBtn = root.querySelector('[data-dyeing-link-add-row="1"]');

      if (!body || !template || !totalForms || !addBtn) return;

      function bindRemoveButtons(scope) {
        scope.querySelectorAll('[data-dyeing-link-remove-row="1"]').forEach(function (btn) {
          if (btn.dataset.bound === "1") return;
          btn.dataset.bound = "1";

          btn.addEventListener("click", function () {
            const row = btn.closest('[data-dyeing-link-row="1"]');
            if (!row) return;

            const deleteInput = row.querySelector('input[type="checkbox"][name$="-DELETE"]');
            if (deleteInput) {
              deleteInput.checked = true;
              row.style.display = "none";
            } else {
              row.remove();
            }
          });
        });
      }

      if (addBtn.dataset.bound !== "1") {
        addBtn.dataset.bound = "1";
        addBtn.addEventListener("click", function () {
          const formIndex = parseInt(totalForms.value || "0", 10);
          const html = template.innerHTML.replace(/__prefix__/g, formIndex);

          const wrapper = document.createElement("tbody");
          wrapper.innerHTML = html.trim();

          const row = wrapper.firstElementChild;
          if (!row) return;

          body.appendChild(row);
          totalForms.value = formIndex + 1;

          bindRemoveButtons(row);
        });
      }

      bindRemoveButtons(root);
    });
  }

  function runEmbedScripts(container) {
    if (!container) return;

    const scripts = container.querySelectorAll("script");
    scripts.forEach((oldScript) => {
      const newScript = document.createElement("script");

      for (const attr of oldScript.attributes) {
        newScript.setAttribute(attr.name, attr.value);
      }

      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }

  function initMastersEmbed(mount) {
    bindEmbedAutosubmit(mount);
    bindMaterialSubtypeForm(mount);
    bindBomForm(mount);
    bindDyeingMasterForm(mount);
  }

function scrollUtilitiesToTop() {
  const header = document.querySelector("#section-utilities .util-head");
  const scrollHost = document.querySelector(".app-content-scroll");
  if (!header) return;

  if (scrollHost) {
    const hostRect = scrollHost.getBoundingClientRect();
    const headerRect = header.getBoundingClientRect();
    const top = Math.max(
      0,
      scrollHost.scrollTop + headerRect.top - hostRect.top - 16
    );

    scrollHost.scrollTo({
      top,
      behavior: "smooth"
    });
    return;
  }

  const top = Math.max(
    0,
    window.scrollY + header.getBoundingClientRect().top - 16
  );

  window.scrollTo({
    top,
    behavior: "smooth"
  });
}

  async function openMastersPanel(url, options = {}) {
    const panel = document.getElementById("mastersEmbedPanel");
    const mount = document.getElementById("mastersEmbedMount");
    if (!panel || !mount) return;

    panel.classList.add("is-open");
    mount.style.pointerEvents = "auto";
    mount.classList.add("is-loading");

    scrollUtilitiesToTop();

    const reqId = ++MASTERS_REQUEST_SEQ;
    const base = LAST_MASTERS_URL || window.location.origin;
    const absUrl = new URL(url, base).toString();
    LAST_MASTERS_URL = absUrl;

    try {
      const method = (options.method || "GET").toUpperCase();
      let fetchUrl = absUrl;
      let body = null;

      const headers = {
        "X-Requested-With": "XMLHttpRequest"
      };

      if (method === "GET") {
        fetchUrl = withEmbed(absUrl);
      } else {
        body = options.body || null;
      }

      const res = await fetch(fetchUrl, {
        method,
        body,
        headers,
        credentials: "same-origin",
      });

      const contentType = res.headers.get("content-type") || "";

      if (contentType.includes("application/json")) {
        const data = await res.json();
        if (reqId !== MASTERS_REQUEST_SEQ) return;

        if (data.url) {
          await openMastersPanel(data.url);
          return;
        }

        mount.innerHTML = `<div class="tiny-note">Saved successfully.</div>`;
        return;
      }

      const html = await res.text();
      if (reqId !== MASTERS_REQUEST_SEQ) return;

      mount.innerHTML = html;
      scrollUtilitiesToTop();
      initMastersEmbed(mount);
      mount.scrollTop = 0;
      runEmbedScripts(mount);
    } catch (err) {
      if (reqId !== MASTERS_REQUEST_SEQ) return;
      mount.innerHTML = `<div class="tiny-note">Unable to load this section.</div>`;
    } finally {
      if (reqId === MASTERS_REQUEST_SEQ) {
        mount.classList.remove("is-loading");
      }
    }
  }

  function closeMastersPanel() {
    const panel = document.getElementById("mastersEmbedPanel");
    const mount = document.getElementById("mastersEmbedMount");
    if (!panel || !mount) return;

    MASTERS_REQUEST_SEQ += 1;
    LAST_MASTERS_URL = null;

    panel.classList.remove("is-open");
    mount.classList.remove("is-loading");

    window.setTimeout(() => {
      if (!panel.classList.contains("is-open")) {
        mount.innerHTML = "";
      }
    }, 240);

    scrollUtilitiesToTop();
  }

  function bootUtilities() {
    const utilitiesRoot = document.getElementById("section-utilities");
    const input = document.getElementById("utilSearch");

    if (!utilitiesRoot || !input) return;

    renderUtilities("");

    input.addEventListener("input", function () {
      renderUtilities(this.value);
    });

    utilitiesRoot.addEventListener("click", function (e) {
      const closeBtn = e.target.closest("[data-embed-close]");
      if (closeBtn) {
        e.preventDefault();
        e.stopPropagation();
        closeMastersPanel();
        return;
      }

      const tile = e.target.closest(".util-tile");
      if (tile) {
        const href = tile.getAttribute("href") || "";
        const name = tile.dataset.name || "";

        if (isMastersTile(name) && href && href !== "javascript:void(0)") {
          e.preventDefault();
          openMastersPanel(href);
          return;
        }
      }

      const link = e.target.closest("a");
      if (!link) return;

      const href = link.getAttribute("href") || "";
      if (!href) return;

      const isInsideMastersPanel = !!link.closest("#mastersEmbedMount");

      if (isMastersUrl(href) || isInsideMastersPanel) {
        e.preventDefault();
        openMastersPanel(href);
      }
    });

    utilitiesRoot.addEventListener("submit", function (e) {
      const form = e.target.closest("form");
      if (!form) return;

      const action = form.getAttribute("action") || window.location.href;
      const isMastersForm = isMastersUrl(action) || form.querySelector('input[name="embed"][value="1"]');

      if (!isMastersForm) return;

      e.preventDefault();

      const method = (form.getAttribute("method") || "GET").toUpperCase();

      if (method === "GET") {
        const url = new URL(action, window.location.origin);
        const fd = new FormData(form);

        for (const [key, value] of fd.entries()) {
          url.searchParams.set(key, value);
        }

        url.searchParams.set("embed", "1");
        openMastersPanel(url.toString(), { method: "GET" });
        return;
      }

      const fd = new FormData(form);
      fd.set("embed", "1");

      openMastersPanel(action, {
        method: "POST",
        body: fd,
      });
    });
  }

  document.addEventListener("DOMContentLoaded", bootUtilities);
})();
